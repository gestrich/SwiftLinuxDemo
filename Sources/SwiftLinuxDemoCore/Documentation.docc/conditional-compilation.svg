<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" font-family="-apple-system, Helvetica, Arial, sans-serif" role="img" aria-label="One Swift source file compiled into a macOS build and a Linux build via #if guards">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect x="6" y="6" width="748" height="348" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- source -->
  <rect x="230" y="40" width="300" height="64" rx="9" fill="#f05138"/>
  <text x="380" y="70" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Your Swift code</text>
  <text x="380" y="91" text-anchor="middle" font-size="12" fill="#ffffff" fill-opacity="0.85">one source file · #if os(…) guards</text>

  <!-- arrows -->
  <line x1="372" y1="106" x2="232" y2="232" stroke="#8b949e" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="388" y1="106" x2="528" y2="232" stroke="#8b949e" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="262" y="168" text-anchor="middle" font-size="11" font-style="italic" fill="#8b949e">build for macOS</text>
  <text x="498" y="168" text-anchor="middle" font-size="11" font-style="italic" fill="#8b949e">build for Linux</text>

  <!-- macOS build -->
  <rect x="70" y="236" width="300" height="80" rx="9" fill="#1f6feb"/>
  <text x="220" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Compiled for macOS</text>
  <text x="220" y="288" text-anchor="middle" font-size="12" fill="#ffffff" fill-opacity="0.85">#if os(macOS) → import AppKit</text>
  <text x="220" y="306" text-anchor="middle" font-size="11" fill="#ffffff" fill-opacity="0.7">libswiftDarwin · Foundation.framework</text>

  <!-- Linux build -->
  <rect x="390" y="236" width="300" height="80" rx="9" fill="#1a7f37"/>
  <text x="540" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Compiled for Linux</text>
  <text x="540" y="288" text-anchor="middle" font-size="12" fill="#ffffff" fill-opacity="0.85">#if os(Linux) → import Glibc</text>
  <text x="540" y="306" text-anchor="middle" font-size="11" fill="#ffffff" fill-opacity="0.7">libswiftGlibc · libFoundation</text>

  <text x="380" y="340" text-anchor="middle" font-size="12" font-style="italic" fill="#8b949e">One codebase; the compiler selects the right branch per target, at build time.</text>
</svg>
