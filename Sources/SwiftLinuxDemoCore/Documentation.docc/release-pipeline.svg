<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Release pipeline flowchart">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- dark card -->
  <rect x="4" y="4" width="752" height="552" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- 1. maintainer trigger -->
  <rect x="230" y="26" width="300" height="58" rx="8" fill="#1f6feb"/>
  <text x="380" y="51" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">scripts/release.sh v1.2.0</text>
  <text x="380" y="72" text-anchor="middle" font-size="12" fill="#cdd9ff">git tag + push origin v1.2.0</text>
  <line x1="380" y1="84" x2="380" y2="116" stroke="#8b949e" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 2. CI panel: release.yml -->
  <rect x="70" y="118" width="620" height="246" rx="10" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="88" y="140" font-size="12.5" font-weight="700" fill="#a371f7">release.yml &#183; runs on every tag (v*)</text>

  <rect x="90" y="150" width="580" height="42" rx="7" fill="#8957e5"/>
  <text x="106" y="176" font-size="13" fill="#ffffff">test  &#183;  swift test on Linux</text>

  <rect x="90" y="200" width="580" height="42" rx="7" fill="#1f6feb"/>
  <text x="106" y="226" font-size="13" fill="#ffffff">build-linux  &#183;  swift build --static-swift-stdlib  &#8594;  tar</text>

  <rect x="120" y="250" width="550" height="36" rx="7" fill="#238636"/>
  <text x="136" y="273" font-size="12.5" fill="#ffffff">&#8627; attest-build-provenance@v2</text>

  <rect x="90" y="294" width="580" height="42" rx="7" fill="#bc4c00"/>
  <text x="106" y="320" font-size="13" fill="#ffffff">release  &#183;  gh release create  (tarball + checksums)</text>

  <line x1="380" y1="364" x2="380" y2="392" stroke="#8b949e" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 3. end user install -->
  <rect x="220" y="394" width="320" height="42" rx="8" fill="#6e7781"/>
  <text x="380" y="420" text-anchor="middle" font-size="13" fill="#ffffff">end user &#183; install.sh</text>
  <line x1="380" y1="436" x2="380" y2="464" stroke="#8b949e" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 4. end user verify -->
  <rect x="145" y="466" width="470" height="64" rx="8" fill="#238636"/>
  <text x="380" y="492" text-anchor="middle" font-size="13.5" font-weight="600" fill="#ffffff">end user &#183; gh attestation verify</text>
  <text x="380" y="514" text-anchor="middle" font-size="11" fill="#aff5b4">swift-linux-demo-linux-x86_64.tar.gz --repo gestrich/SwiftLinuxDemo</text>
</svg>
