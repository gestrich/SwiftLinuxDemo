<svg xmlns="http://www.w3.org/2000/svg" width="820" height="706" viewBox="0 0 820 706" font-family="-apple-system, Helvetica, Arial, sans-serif" role="img" aria-label="The system stack as three zones — user space, kernel space, and hardware — separated by interface boundaries">
  <!-- dark card -->
  <rect x="6" y="6" width="808" height="694" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- ===== USER SPACE zone ===== -->
  <rect x="70" y="40" width="680" height="316" rx="12" fill="#161b22" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="90" y="66" font-size="12.5" font-weight="700" letter-spacing="1" fill="#f0883e">USER SPACE</text>

  <rect x="86" y="80" width="648" height="46" rx="8" fill="#f05138"/>
  <text x="104" y="109" font-size="14.5" font-weight="600" fill="#ffffff">Your Swift code</text>
  <text x="718" y="109" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">#if os(…) · platform guards</text>

  <rect x="86" y="134" width="648" height="46" rx="8" fill="#e8590c"/>
  <text x="104" y="163" font-size="14.5" font-weight="600" fill="#ffffff">Foundation</text>
  <text x="718" y="163" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">optional · Foundation.framework / libFoundation</text>

  <rect x="86" y="188" width="648" height="46" rx="8" fill="#d97706"/>
  <text x="104" y="217" font-size="14.5" font-weight="600" fill="#ffffff">Swift standard library</text>
  <text x="718" y="217" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">libswiftCore · Array · String</text>

  <rect x="86" y="242" width="648" height="46" rx="8" fill="#bf8700"/>
  <text x="104" y="271" font-size="14.5" font-weight="600" fill="#ffffff">Swift runtime</text>
  <text x="718" y="271" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">in libswiftCore · ARC · metadata</text>

  <rect x="86" y="296" width="648" height="46" rx="8" fill="#8957e5"/>
  <text x="104" y="325" font-size="14.5" font-weight="600" fill="#ffffff">System libraries (the C library)</text>
  <text x="718" y="325" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">glibc · musl · libSystem</text>

  <!-- "ships with your app" bracket: your code + Foundation + stdlib + runtime (not libc) -->
  <g stroke="#3fb950" stroke-width="1.5" fill="none">
    <path d="M752 80 L760 80 L760 288 L752 288"/>
  </g>
  <text x="775" y="184" transform="rotate(-90 775 184)" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">ships with your app</text>

  <!-- boundary: system call ABI -->
  <rect x="70" y="366" width="680" height="30" rx="8" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="410" y="385" text-anchor="middle" font-size="12.5" font-style="italic" fill="#c9d1d9">system call ABI&#160;&#160;·&#160;&#160;open() · read() · close()</text>

  <!-- ===== KERNEL SPACE zone ===== -->
  <rect x="70" y="408" width="680" height="100" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="90" y="432" font-size="12.5" font-weight="700" letter-spacing="1" fill="#58a6ff">KERNEL SPACE</text>

  <rect x="86" y="446" width="648" height="46" rx="8" fill="#1f6feb"/>
  <text x="104" y="475" font-size="14.5" font-weight="600" fill="#ffffff">Kernel</text>
  <text x="718" y="475" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">Linux · XNU · (scheduler, memory, FS, net, drivers)</text>

  <!-- boundary: instruction set -->
  <rect x="70" y="518" width="680" height="30" rx="8" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="410" y="537" text-anchor="middle" font-size="12.5" font-style="italic" fill="#c9d1d9">instruction set (ISA)&#160;&#160;·&#160;&#160;x86_64 · ARM64 · RISC-V</text>

  <!-- ===== HARDWARE zone ===== -->
  <rect x="70" y="560" width="680" height="100" rx="12" fill="#161b22" stroke="#8b949e" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="90" y="584" font-size="12.5" font-weight="700" letter-spacing="1" fill="#8b949e">HARDWARE</text>

  <rect x="86" y="598" width="648" height="46" rx="8" fill="#545d68"/>
  <text x="104" y="627" font-size="14.5" font-weight="600" fill="#ffffff">Hardware</text>
  <text x="718" y="627" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">CPU · memory · devices</text>

  <!-- footer -->
  <text x="410" y="684" text-anchor="middle" font-size="12" fill="#8b949e" font-style="italic">Solid bars are components (rooms); dashed edges are interfaces (the doorways between them).</text>
</svg>
