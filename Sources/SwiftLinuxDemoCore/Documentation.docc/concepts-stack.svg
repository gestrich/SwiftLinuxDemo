<svg xmlns="http://www.w3.org/2000/svg" width="820" height="650" viewBox="0 0 820 650" font-family="-apple-system, Helvetica, Arial, sans-serif" role="img" aria-label="The system stack as three zones — user space, kernel space, and hardware — separated by interface boundaries">
  <!-- dark card -->
  <rect x="6" y="6" width="808" height="638" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- ===== USER SPACE zone ===== -->
  <rect x="70" y="40" width="680" height="262" rx="12" fill="#161b22" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="90" y="66" font-size="12.5" font-weight="700" letter-spacing="1" fill="#f0883e">USER SPACE</text>

  <rect x="86" y="80" width="648" height="46" rx="8" fill="#f05138"/>
  <text x="104" y="109" font-size="14.5" font-weight="600" fill="#ffffff">Your Swift code</text>
  <text x="718" y="109" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">#if os(…) · platform guards</text>

  <rect x="86" y="134" width="648" height="46" rx="8" fill="#db6d28"/>
  <text x="104" y="163" font-size="14.5" font-weight="600" fill="#ffffff">Swift standard library + Foundation</text>
  <text x="718" y="163" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">portable core · Foundation optional</text>

  <rect x="86" y="188" width="648" height="46" rx="8" fill="#bf8700"/>
  <text x="104" y="217" font-size="14.5" font-weight="600" fill="#ffffff">Swift runtime</text>
  <text x="718" y="217" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">ARC · generics · dispatch</text>

  <rect x="86" y="242" width="648" height="46" rx="8" fill="#8957e5"/>
  <text x="104" y="271" font-size="14.5" font-weight="600" fill="#ffffff">System libraries (the C library)</text>
  <text x="718" y="271" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">glibc · musl · libSystem</text>

  <!-- "ships with your app" bracket over your code + the Swift libraries (not libc) -->
  <g stroke="#3fb950" stroke-width="1.5" fill="none">
    <path d="M752 80 L760 80 L760 234 L752 234"/>
  </g>
  <text x="775" y="157" transform="rotate(-90 775 157)" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">ships with your app</text>

  <!-- boundary: system call ABI -->
  <rect x="70" y="312" width="680" height="30" rx="8" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="410" y="331" text-anchor="middle" font-size="12.5" font-style="italic" fill="#c9d1d9">system call ABI&#160;&#160;·&#160;&#160;open() · read() · close()</text>

  <!-- ===== KERNEL SPACE zone ===== -->
  <rect x="70" y="354" width="680" height="100" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="90" y="378" font-size="12.5" font-weight="700" letter-spacing="1" fill="#58a6ff">KERNEL SPACE</text>

  <rect x="86" y="392" width="648" height="46" rx="8" fill="#1f6feb"/>
  <text x="104" y="421" font-size="14.5" font-weight="600" fill="#ffffff">Kernel</text>
  <text x="718" y="421" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">Linux · XNU · (scheduler, memory, FS, net, drivers)</text>

  <!-- boundary: instruction set -->
  <rect x="70" y="464" width="680" height="30" rx="8" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="410" y="483" text-anchor="middle" font-size="12.5" font-style="italic" fill="#c9d1d9">instruction set (ISA)&#160;&#160;·&#160;&#160;x86_64 · ARM64 · RISC-V</text>

  <!-- ===== HARDWARE zone ===== -->
  <rect x="70" y="506" width="680" height="100" rx="12" fill="#161b22" stroke="#8b949e" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="90" y="530" font-size="12.5" font-weight="700" letter-spacing="1" fill="#8b949e">HARDWARE</text>

  <rect x="86" y="544" width="648" height="46" rx="8" fill="#545d68"/>
  <text x="104" y="573" font-size="14.5" font-weight="600" fill="#ffffff">Hardware</text>
  <text x="718" y="573" font-size="12" text-anchor="end" fill="#ffffff" fill-opacity="0.85">CPU · memory · devices</text>

  <!-- footer -->
  <text x="410" y="628" text-anchor="middle" font-size="12" fill="#8b949e" font-style="italic">Solid bars are components (rooms); dashed edges are interfaces (the doorways between them).</text>
</svg>
