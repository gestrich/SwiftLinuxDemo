<svg xmlns="http://www.w3.org/2000/svg" width="780" height="370" viewBox="0 0 780 370" font-family="-apple-system, Helvetica, Arial, sans-serif" role="img" aria-label="Cross-compilation builds for another CPU and runs natively; emulation translates another CPU's instructions at run time">
  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect x="6" y="6" width="768" height="358" rx="16" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- divider -->
  <line x1="390" y1="40" x2="390" y2="330" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- LEFT: cross-compilation -->
  <text x="210" y="46" text-anchor="middle" font-size="14" font-weight="700" fill="#3fb950">Cross-compilation</text>
  <rect x="70" y="64" width="280" height="44" rx="8" fill="#545d68"/>
  <text x="210" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Build host (your Mac)</text>
  <line x1="210" y1="110" x2="210" y2="154" stroke="#8b949e" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="222" y="136" font-size="11" font-style="italic" fill="#8b949e">emit aarch64 code</text>
  <rect x="70" y="158" width="280" height="44" rx="8" fill="#3fb950"/>
  <text x="210" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">aarch64 Linux binary</text>
  <line x1="210" y1="204" x2="210" y2="248" stroke="#8b949e" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="222" y="230" font-size="11" font-style="italic" fill="#8b949e">copy over, run as-is</text>
  <rect x="70" y="252" width="280" height="44" rx="8" fill="#1a7f37"/>
  <text x="210" y="279" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">runs natively on the Pi</text>
  <text x="210" y="322" text-anchor="middle" font-size="12" font-style="italic" fill="#8b949e">no translation — full speed</text>

  <!-- RIGHT: emulation -->
  <text x="585" y="46" text-anchor="middle" font-size="14" font-weight="700" fill="#e8590c">Emulation</text>
  <rect x="445" y="64" width="280" height="44" rx="8" fill="#3fb950"/>
  <text x="585" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">aarch64 binary</text>
  <line x1="585" y1="110" x2="585" y2="154" stroke="#8b949e" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="597" y="136" font-size="11" font-style="italic" fill="#8b949e">every instruction</text>
  <rect x="445" y="158" width="280" height="44" rx="8" fill="#e8590c"/>
  <text x="585" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">emulator (e.g. QEMU)</text>
  <line x1="585" y1="204" x2="585" y2="248" stroke="#8b949e" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="597" y="230" font-size="11" font-style="italic" fill="#8b949e">translated live</text>
  <rect x="445" y="252" width="280" height="44" rx="8" fill="#545d68"/>
  <text x="585" y="279" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">runs on an x86 host</text>
  <text x="585" y="322" text-anchor="middle" font-size="12" font-style="italic" fill="#8b949e">live translation — slower</text>
</svg>
