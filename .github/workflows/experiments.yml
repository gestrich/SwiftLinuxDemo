name: Experiments

# Manually-triggered workflow that intentionally breaks the build to capture
# the exact compiler error each guard in Package.swift / source code
# prevents on Linux. The captured stderr is the deliverable — each job
# uploads `experiments/<name>.log` as an artifact so the Discoveries
# tutorial chapter can quote literal error output instead of paraphrasing.

on:
  workflow_dispatch:

jobs:
  baseline:
    name: Baseline (no mutations) — should succeed
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Build
        id: build
        run: |
          mkdir -p experiments
          set +e
          swift build 2> experiments/baseline.log
          echo "exitcode=$?" >> experiments/baseline.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-baseline
          path: experiments/baseline.log

  strip-when-from-Crypto:
    name: Strip .when(platforms:) from swift-crypto product
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Package.swift
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("Package.swift")
          src = p.read_text()
          new = re.sub(
              r'\.product\(name:\s*"Crypto",\s*package:\s*"swift-crypto",\s*condition:\s*\.when\(platforms:\s*\[\.linux\]\)\)',
              '.product(name: "Crypto", package: "swift-crypto")',
              src,
          )
          assert new != src, "no substitution made — pattern drift"
          p.write_text(new)
          print(new)
          PY
      - name: Build (expect: succeeds on Linux)
        run: |
          mkdir -p experiments
          set +e
          swift build 2> experiments/strip-when-from-Crypto.log
          echo "exitcode=$?" >> experiments/strip-when-from-Crypto.log
          cat experiments/strip-when-from-Crypto.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-strip-when-from-Crypto
          path: experiments/strip-when-from-Crypto.log

  strip-canImport-force-CryptoKit:
    name: Strip #if canImport(CryptoKit), force `import CryptoKit`
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Hasher.swift to force CryptoKit
        run: |
          cat > Sources/SwiftLinuxDemoCore/Hasher.swift <<'SWIFT'
          import Foundation
          import CryptoKit

          public struct Hasher: Sendable {
              public init() {}
              public func sha256Hex(_ input: String) -> String {
                  let data = Data(input.utf8)
                  let digest = SHA256.hash(data: data)
                  return digest.map { String(format: "%02x", $0) }.joined()
              }
          }
          SWIFT
      - name: Build (expect: fails with "no such module 'CryptoKit'")
        run: |
          mkdir -p experiments
          set +e
          swift build 2> experiments/strip-canImport-force-CryptoKit.log
          echo "exitcode=$?" >> experiments/strip-canImport-force-CryptoKit.log
          cat experiments/strip-canImport-force-CryptoKit.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-strip-canImport-force-CryptoKit
          path: experiments/strip-canImport-force-CryptoKit.log

  strip-canImport-force-Crypto-without-dep:
    name: Strip #if canImport(CryptoKit), force `import Crypto`, AND remove the Crypto dep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Hasher.swift to force Crypto
        run: |
          cat > Sources/SwiftLinuxDemoCore/Hasher.swift <<'SWIFT'
          import Foundation
          import Crypto

          public struct Hasher: Sendable {
              public init() {}
              public func sha256Hex(_ input: String) -> String {
                  let data = Data(input.utf8)
                  let digest = SHA256.hash(data: data)
                  return digest.map { String(format: "%02x", $0) }.joined()
              }
          }
          SWIFT
      - name: Remove Crypto product dep from SwiftLinuxDemoCore target
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("Package.swift")
          src = p.read_text()
          new = re.sub(
              r',?\s*\.product\(name:\s*"Crypto",\s*package:\s*"swift-crypto",\s*condition:\s*\.when\(platforms:\s*\[\.linux\]\)\)',
              '',
              src,
          )
          assert new != src, "no substitution made — pattern drift"
          p.write_text(new)
          print(new)
          PY
      - name: Build (expect: fails with "no such module 'Crypto'")
        run: |
          mkdir -p experiments
          set +e
          swift build 2> experiments/strip-canImport-force-Crypto-without-dep.log
          echo "exitcode=$?" >> experiments/strip-canImport-force-Crypto-without-dep.log
          cat experiments/strip-canImport-force-Crypto-without-dep.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-strip-canImport-force-Crypto-without-dep
          path: experiments/strip-canImport-force-Crypto-without-dep.log
