name: Experiments

# Manually-triggered workflow that intentionally breaks the build to capture
# the exact compiler error each guard in Package.swift / source code
# prevents on Linux. The captured stderr+stdout is the deliverable — each
# job uploads `experiments/<name>.log` as an artifact so the Discoveries
# tutorial chapter can quote literal error output instead of paraphrasing.
#
# Why `2>&1`: `swift build` emits package-resolution lines on stderr but
# compiler diagnostics on stdout, so capturing only one stream misses the
# error we care about. Combine them.

on:
  workflow_dispatch:

jobs:
  baseline:
    name: "Baseline — should succeed"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Build
        run: |
          mkdir -p experiments
          set +e
          swift build > experiments/baseline.log 2>&1
          echo "---" >> experiments/baseline.log
          echo "exitcode=$?" >> experiments/baseline.log
          cat experiments/baseline.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-baseline
          path: experiments/baseline.log

  strip-when-from-Crypto:
    name: "Strip .when(platforms:) from swift-crypto"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Package.swift
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("Package.swift")
          src = p.read_text()
          new = re.sub(
              r'\.product\(name:\s*"Crypto",\s*package:\s*"swift-crypto",\s*condition:\s*\.when\(platforms:\s*\[\.linux\]\)\)',
              '.product(name: "Crypto", package: "swift-crypto")',
              src,
          )
          assert new != src, "no substitution made — pattern drift"
          p.write_text(new)
          print(new)
          PY
      - name: "Build (expect: succeeds on Linux)"
        run: |
          mkdir -p experiments
          set +e
          swift build > experiments/strip-when-from-Crypto.log 2>&1
          echo "---" >> experiments/strip-when-from-Crypto.log
          echo "exitcode=$?" >> experiments/strip-when-from-Crypto.log
          cat experiments/strip-when-from-Crypto.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-strip-when-from-Crypto
          path: experiments/strip-when-from-Crypto.log

  strip-canImport-force-CryptoKit:
    name: "Strip canImport guard, force `import CryptoKit`"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Hasher.swift to force CryptoKit
        run: |
          cat > Sources/SwiftLinuxDemoCore/Hasher.swift <<'SWIFT'
          import Foundation
          import CryptoKit

          public struct Hasher: Sendable {
              public init() {}
              public func sha256Hex(_ input: String) -> String {
                  let data = Data(input.utf8)
                  let digest = SHA256.hash(data: data)
                  return digest.map { String(format: "%02x", $0) }.joined()
              }
          }
          SWIFT
      - name: "Build (expect: fails with no such module 'CryptoKit')"
        run: |
          mkdir -p experiments
          set +e
          swift build > experiments/strip-canImport-force-CryptoKit.log 2>&1
          echo "---" >> experiments/strip-canImport-force-CryptoKit.log
          echo "exitcode=$?" >> experiments/strip-canImport-force-CryptoKit.log
          cat experiments/strip-canImport-force-CryptoKit.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-strip-canImport-force-CryptoKit
          path: experiments/strip-canImport-force-CryptoKit.log

  strip-canImport-force-Crypto-without-dep:
    name: "Strip canImport guard, force `import Crypto`, remove Crypto dep"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Hasher.swift to force Crypto
        run: |
          cat > Sources/SwiftLinuxDemoCore/Hasher.swift <<'SWIFT'
          import Foundation
          import Crypto

          public struct Hasher: Sendable {
              public init() {}
              public func sha256Hex(_ input: String) -> String {
                  let data = Data(input.utf8)
                  let digest = SHA256.hash(data: data)
                  return digest.map { String(format: "%02x", $0) }.joined()
              }
          }
          SWIFT
      - name: Remove Crypto from SwiftLinuxDemoCore target dependencies
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("Package.swift")
          src = p.read_text()
          # Replace the entire SwiftLinuxDemoCore target's dependencies array
          # with an empty list so the manifest stays syntactically valid.
          # DOTALL so the `.` in `[^\]]*` doesn't trip on newlines (it won't
          # here, but be explicit).
          new = re.sub(
              r'(\.target\(\s*name:\s*"SwiftLinuxDemoCore",\s*dependencies:\s*)\[(?:[^\[\]]|\[[^\]]*\])*\]',
              r'\1[]',
              src,
              flags=re.DOTALL,
          )
          assert new != src, "no substitution made — pattern drift"
          p.write_text(new)
          print(new)
          PY
      - name: "Build (expect: fails with no such module 'Crypto')"
        run: |
          mkdir -p experiments
          set +e
          swift build > experiments/strip-canImport-force-Crypto-without-dep.log 2>&1
          echo "---" >> experiments/strip-canImport-force-Crypto-without-dep.log
          echo "exitcode=$?" >> experiments/strip-canImport-force-Crypto-without-dep.log
          cat experiments/strip-canImport-force-Crypto-without-dep.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-strip-canImport-force-Crypto-without-dep
          path: experiments/strip-canImport-force-Crypto-without-dep.log

  # --------------------------------------------------------------------------
  # Pattern-specific experiments against the platform-EXCLUSIVE targets
  # (AppKitGreeter on macOS, GlibcGreeter on Linux). These are stronger
  # demonstrations than the swift-crypto experiments above, because the
  # targets themselves are un-compileable on the other platform.
  # --------------------------------------------------------------------------

  strip-if-os-around-platform-targets:
    name: "EXP-D — declare AppKitGreeter target unconditionally (no #if os in manifest)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Package.swift — declare both targets unconditionally
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("Package.swift")
          src = p.read_text()
          replacement = (
              'let platformExclusiveTargets: [Target] = [\n'
              '    .target(name: "AppKitGreeter"),\n'
              '    .target(name: "GlibcGreeter"),\n'
              ']\n'
              'let platformExclusiveCoreDeps: [Target.Dependency] = '
              '["AppKitGreeter", "GlibcGreeter"]'
          )
          new = re.sub(
              r'#if os\(macOS\).*?#endif',
              replacement,
              src,
              count=1,
              flags=re.DOTALL,
          )
          assert new != src, "no substitution made — pattern drift"
          p.write_text(new)
          print(new)
          PY
      - name: "Build (expect: fails with no such module 'AppKit')"
        run: |
          mkdir -p experiments
          set +e
          swift build > experiments/exp-d-strip-if-os-around-platform-targets.log 2>&1
          rc=$?
          echo "---" >> experiments/exp-d-strip-if-os-around-platform-targets.log
          echo "exitcode=$rc" >> experiments/exp-d-strip-if-os-around-platform-targets.log
          cat experiments/exp-d-strip-if-os-around-platform-targets.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-d-strip-if-os-around-platform-targets
          path: experiments/exp-d-strip-if-os-around-platform-targets.log

  forget-if-os-around-dep-edge:
    name: "EXP-E — keep target guard, forget #if os around the Core dep edge"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate Package.swift — gate target, but force Core to depend on AppKitGreeter unconditionally
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("Package.swift")
          src = p.read_text()
          # Keep the per-platform target declarations intact; only mutate
          # the platformExclusiveCoreDeps reference to be unconditional.
          replacement = (
              '#if os(macOS)\n'
              'let platformExclusiveTargets: [Target] = [\n'
              '    .target(name: "AppKitGreeter"),\n'
              ']\n'
              '#elseif os(Linux)\n'
              'let platformExclusiveTargets: [Target] = [\n'
              '    .target(name: "GlibcGreeter"),\n'
              ']\n'
              '#else\n'
              'let platformExclusiveTargets: [Target] = []\n'
              '#endif\n'
              '\n'
              '// Pattern E mutation: dep edge is now unconditional even '
              'though the target it names is platform-gated.\n'
              'let platformExclusiveCoreDeps: [Target.Dependency] = '
              '["AppKitGreeter"]'
          )
          new = re.sub(
              r'#if os\(macOS\).*?#endif',
              replacement,
              src,
              count=1,
              flags=re.DOTALL,
          )
          assert new != src, "no substitution made — pattern drift"
          p.write_text(new)
          print(new)
          PY
      - name: "Build (expect: manifest fails — unknown target 'AppKitGreeter' on Linux)"
        run: |
          mkdir -p experiments
          set +e
          swift build > experiments/exp-e-forget-if-os-around-dep-edge.log 2>&1
          rc=$?
          echo "---" >> experiments/exp-e-forget-if-os-around-dep-edge.log
          echo "exitcode=$rc" >> experiments/exp-e-forget-if-os-around-dep-edge.log
          cat experiments/exp-e-forget-if-os-around-dep-edge.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-e-forget-if-os-around-dep-edge
          path: experiments/exp-e-forget-if-os-around-dep-edge.log

  strip-source-level-if-os:
    name: "EXP-F — strip #if os(...) in source, force unconditional `import AppKitGreeter`"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Mutate PlatformReport.swift — force unconditional AppKitGreeter import
        run: |
          cat > Sources/SwiftLinuxDemoCore/PlatformReport.swift <<'SWIFT'
          import AppKitGreeter

          public enum PlatformReport {
              public static func line() -> String {
                  return AppKitGreeter().runtimeReport()
              }
          }
          SWIFT
      - name: "Build (expect: fails with no such module 'AppKitGreeter' on Linux)"
        run: |
          mkdir -p experiments
          set +e
          swift build > experiments/exp-f-strip-source-level-if-os.log 2>&1
          rc=$?
          echo "---" >> experiments/exp-f-strip-source-level-if-os.log
          echo "exitcode=$rc" >> experiments/exp-f-strip-source-level-if-os.log
          cat experiments/exp-f-strip-source-level-if-os.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-f-strip-source-level-if-os
          path: experiments/exp-f-strip-source-level-if-os.log

  # --------------------------------------------------------------------------
  # Toolchain-source experiment: can we drop swift-actions/setup-swift and
  # rely on whatever Swift the runner image ships?
  # --------------------------------------------------------------------------

  no-setup-swift-on-ubuntu-24:
    name: "EXP-G — no setup-swift, ubuntu-24.04 only"
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Probe what the image ships
        run: |
          mkdir -p experiments
          {
            echo "## which swift"
            which swift || echo "(swift not on PATH)"
            echo ""
            echo "## swift --version"
            swift --version 2>&1 || true
            echo ""
            echo "## /etc/os-release"
            cat /etc/os-release
            echo ""
            echo "## libcurl4-openssl-dev installed?"
            dpkg -l libcurl4-openssl-dev 2>&1 | tail -3 || true
            echo "## libxml2-dev installed?"
            dpkg -l libxml2-dev 2>&1 | tail -3 || true
          } > experiments/exp-g-probe.log
          cat experiments/exp-g-probe.log
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Build with image-supplied Swift
        run: |
          set +e
          swift build > experiments/exp-g-build.log 2>&1
          rc=$?
          echo "---" >> experiments/exp-g-build.log
          echo "exitcode=$rc" >> experiments/exp-g-build.log
          tail -40 experiments/exp-g-build.log
      - name: Test with image-supplied Swift
        run: |
          set +e
          swift test > experiments/exp-g-test.log 2>&1
          rc=$?
          echo "---" >> experiments/exp-g-test.log
          echo "exitcode=$rc" >> experiments/exp-g-test.log
          tail -40 experiments/exp-g-test.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-g-no-setup-swift
          path: experiments/exp-g-*.log

  no-setup-swift-on-ubuntu-22:
    name: "EXP-H — no setup-swift, ubuntu-22.04 only"
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Probe what the image ships
        run: |
          mkdir -p experiments
          {
            echo "## which swift"
            which swift || echo "(swift not on PATH)"
            echo ""
            echo "## swift --version"
            swift --version 2>&1 || true
            echo ""
            echo "## /etc/os-release"
            cat /etc/os-release
          } > experiments/exp-h-probe.log
          cat experiments/exp-h-probe.log
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev
      - name: Build with image-supplied Swift
        run: |
          set +e
          swift build > experiments/exp-h-build.log 2>&1
          rc=$?
          echo "---" >> experiments/exp-h-build.log
          echo "exitcode=$rc" >> experiments/exp-h-build.log
          tail -40 experiments/exp-h-build.log
      - uses: actions/upload-artifact@v4
        with:
          name: exp-h-no-setup-swift-22
          path: experiments/exp-h-*.log
