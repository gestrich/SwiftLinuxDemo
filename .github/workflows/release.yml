name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - name: Test
        run: swift test

  build-linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - name: Build
        run: swift build -c release --product swift-linux-demo --static-swift-stdlib

      - name: Package
        run: tar -czf swift-linux-demo-linux-x86_64.tar.gz -C .build/release swift-linux-demo

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'swift-linux-demo-*.tar.gz'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swift-linux-demo-linux-x86_64
          path: swift-linux-demo-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: swift-linux-demo-linux-x86_64

      - name: Generate checksums
        run: sha256sum swift-linux-demo-linux-x86_64.tar.gz > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --repo ${{ github.repository }} \
            swift-linux-demo-linux-x86_64.tar.gz \
            checksums.txt
