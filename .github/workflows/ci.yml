name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Linux)
    # ubuntu-24.04 ships Swift preinstalled — pinning the image keeps
    # the toolchain version stable across runs.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libxml2-dev

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build release binary (static stdlib)
        run: swift build -c release --product swift-linux-demo --static-swift-stdlib

      - name: Smoke test the binary
        run: |
          .build/release/swift-linux-demo --version
          .build/release/swift-linux-demo greet --name CI
          .build/release/swift-linux-demo hash "abc"
          .build/release/swift-linux-demo info
